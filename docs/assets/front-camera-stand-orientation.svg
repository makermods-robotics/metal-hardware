<svg xmlns="http://www.w3.org/2000/svg" width="960" height="560" viewBox="0 0 960 560" role="img" aria-labelledby="title desc">
  <title id="title">Front camera stand mounting hole orientation</title>
  <desc id="desc">Top-view technical diagram showing the table edge, inner side of the table, base plate, central 2x2 hole group, and four-hole straight-line group on the table-inner side of the base plate.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1f2937"/>
    </marker>
    <style>
      .label {
        font-family: Arial, Helvetica, sans-serif;
        font-size: 22px;
        fill: #111827;
      }
      .small-label {
        font-family: Arial, Helvetica, sans-serif;
        font-size: 18px;
        fill: #111827;
      }
      .line {
        stroke: #1f2937;
        stroke-width: 3;
        fill: none;
        marker-end: url(#arrow);
      }
      .thin-line {
        stroke: #374151;
        stroke-width: 2;
        fill: none;
      }
      .hole {
        fill: #0b0d10;
        stroke: #9ca3af;
        stroke-width: 2;
      }
    </style>
  </defs>

  <rect width="960" height="560" fill="#ffffff"/>

  <!-- Tabletop, shown from above. The area above the edge is the inner side of the table. -->
  <rect x="70" y="70" width="820" height="330" rx="6" fill="#e8ddcf" stroke="#7c6f64" stroke-width="3"/>
  <path d="M70 400 H890" stroke="#5f574f" stroke-width="9" stroke-linecap="round"/>
  <path d="M70 416 H890" stroke="#c6b8a8" stroke-width="6" stroke-linecap="round"/>

  <!-- Base plate, top view. -->
  <rect x="160" y="205" width="640" height="150" rx="4" fill="#20242b" stroke="#05070a" stroke-width="3"/>
  <path d="M160 209 H800" stroke="#59606b" stroke-width="2"/>
  <path d="M160 355 H800" stroke="#05070a" stroke-width="4"/>

  <!-- Four extra holes in a straight line on the side facing the inner side of the table. -->
  <g id="inner-side-straight-line-holes">
    <circle class="hole" cx="390" cy="225" r="7"/>
    <circle class="hole" cx="450" cy="225" r="7"/>
    <circle class="hole" cx="510" cy="225" r="7"/>
    <circle class="hole" cx="570" cy="225" r="7"/>
  </g>

  <!-- Central 2x2 square hole group in the middle of the base plate. -->
  <g id="central-2x2-hole-group">
    <circle class="hole" cx="456" cy="260" r="8"/>
    <circle class="hole" cx="504" cy="260" r="8"/>
    <circle class="hole" cx="456" cy="300" r="8"/>
    <circle class="hole" cx="504" cy="300" r="8"/>
  </g>
  <rect x="432" y="240" width="96" height="80" rx="4" fill="none" stroke="#f59e0b" stroke-width="3" stroke-dasharray="8 6"/>

  <!-- Orientation labels and callouts. -->
  <text x="374" y="48" class="label">inner side of table</text>
  <path d="M480 58 V126" class="line"/>

  <text x="58" y="455" class="label">table edge</text>
  <path d="M174 447 L302 405" class="line"/>

  <text x="330" y="390" class="small-label">base plate</text>
  <path d="M418 383 V354" class="line"/>

  <text x="588" y="165" class="small-label">4-hole straight-line group</text>
  <text x="588" y="188" class="small-label">on table-inner side</text>
  <path d="M584 183 L552 222" class="line"/>

  <text x="590" y="310" class="small-label">central 2x2 hole group</text>
  <path d="M584 305 L520 282" class="line"/>

  <!-- Direction cue from table edge toward the inside. -->
  <path d="M845 400 V130" class="thin-line" marker-end="url(#arrow)"/>
  <text x="804" y="121" class="small-label">inside</text>
</svg>
